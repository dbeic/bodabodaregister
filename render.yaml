services:
  - type: web
    name: bodaboda-sacco-registration
    runtime: python
    repo: https://github.com/yourusername/bodaboda-registration
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bodaboda-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GROUP_NAME
        value: "Kisumu Bodaboda SACCO"
      - key: FLASK_ENV
        value: production
      - key: DEBUG
        value: false

databases:
  - name: bodaboda-db
    plan: free
    region: oregon
